name: Generate Blog Manifest

on:
  push:
    branches:
      - main
    paths:
      - "blog/**"
      - "sitemap.xml"
      - ".github/workflows/generate-blog.yml"
  workflow_dispatch:

jobs:
  generate-blog:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate blog artifacts
        run: node blog/generate-articles.js

      - name: Commit updated blog files
        run: |
          if git diff --quiet -- blog/articles.json blog/index.html sitemap.xml; then
            echo "No blog changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/articles.json blog/index.html sitemap.xml
          git commit -m "chore: update blog manifest"
          git push
