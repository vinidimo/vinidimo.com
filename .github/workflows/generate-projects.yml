name: Generate Projects Manifest

on:
  push:
    branches:
      - main
    paths:
      - "assets/projects/**"
      - "generate-projects.js"
      - ".github/workflows/generate-projects.yml"
  workflow_dispatch:

jobs:
  generate-projects:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate projects.json
        run: node generate-projects.js

      - name: Commit updated manifest
        run: |
          if git diff --quiet -- assets/projects/projects.json; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/projects/projects.json
          git commit -m "chore: update projects manifest"
          git push
