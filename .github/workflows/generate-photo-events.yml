name: Generate Photo Events

on:
  push:
    branches:
      - main
    paths:
      - "fotos/**"
      - "assets/logo-black.svg"
      - "assets/logo-white.svg"
      - "fotos/generate-photo-events.js"
      - ".github/workflows/generate-photo-events.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-photo-events:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate photo event artifacts
        run: node fotos/generate-photo-events.js

      - name: Commit updated photo gallery files
        run: |
          if git diff --quiet -- fotos; then
            echo "No photo gallery changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fotos
          git commit -m "chore: update photo galleries"
          git push
